<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Selectors Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CSS Selectors Example</h1>

<!-- Element Selector -->
<p>This is a paragraph (Element Selector)</p>

<!-- Class Selector -->
<p class="box">This is a class selector</p>

<!-- ID Selector -->
<p id="unique">This is an ID selector</p>

<!-- Descendant Selector -->
<div>
    <p>This is inside div (Descendant)</p>
</div>

<!-- Child Selector -->
<div class="parent">
    <p>This is direct child</p>
</div>

<!-- Adjacent Sibling -->
<h2>Heading</h2>
<p>This paragraph is next to h2</p>

<!-- Group Selector -->
<h3>Group Selector Heading</h3>
<span>Group Selector Span</span>

</body>
</html>
