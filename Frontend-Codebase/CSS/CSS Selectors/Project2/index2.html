<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>My Profile</h1>

<!-- Main Card -->
<div class="card" id="mainCard">

    <h2>Abhishek</h2>

    <p class="info">Web Developer</p>

    <!-- Descendant -->
    <div class="details">
    <p>Learning HTML & CSS</p>
    </div>

    <!-- Child -->
    <div class="skills">
    <p>HTML</p>
    <p>CSS</p>
    </div>

</div>

<!-- Adjacent Sibling -->
<h3>Contact Info</h3>
<p>Email: abhishek@gmail.com</p>

<!-- Group Selector -->
<span>Follow me</span>
<h4>Thank You!</h4>

</body>
</html>
