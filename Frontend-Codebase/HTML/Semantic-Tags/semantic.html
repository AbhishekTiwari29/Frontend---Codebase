<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Tags</title>
</head>
<body>
    <!-- <div> → Block container -->

        <div>
            <h2>Welcome</h2>
            <p>This is a div container.</p>
        </div>

<!-- <span> → Inline container -->

        <p>This is <span>important text</span> inside a paragraph.</p>

<!-- <header> -->

        <header>
            <h1>My Website</h>
        </header>

<!-- <nav> -->

        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>

<!-- <main> -->

        <main>
            <p>This is the main content of the page.</p>
        </main>

<!-- <section> -->

        <section>
            <h2>Services</h2>
            <p>We provide web development services.</p>
        </section>

<!-- <article> -->

        <article>
            <h2>Blog Post</h2>
            <p>This is a blog article.</p>
        </article>

<!-- <aside> -->
      
        <aside>
            <h3>Related Links</h3>
            <p>Learn more about HTML.</>
        </aside>

<!-- <footer> -->

        <footer>
            <p>© 2026 My Website</p>
        </footer>
    
</body>
</html>
