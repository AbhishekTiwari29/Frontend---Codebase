<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unordered list</title>
</head>
<body>
    <h1>UNORDERED LISTS</h1>

    <h2>FRUITS LIST</h2>
    <ul type="square">
        <li>Apple</li>
        <li>banana</li>
        <li>mango</li>
        <li>orange</li>
        <li>cherry</li>
        <li>graphs</li>
    </ul>

    <h2>CITIES LIST</h2>
    <ul>
        <li>Mumbai</li>
        <li>Bhopal</li>
        <li>Indore</li>
        <li>Sagar</li>
        <li>Nagpur</li>
        <li>Jabalpur</li>
    </ul>
</body>
</html>
